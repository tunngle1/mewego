
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME·WE·GO App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mewego-bg': '#FBF5E5',
                        'mewego-neutral': '#D0D4C5',
                        'mewego-surface': '#AAC4BB',
                        'mewego-text': '#171E22',
                        'mewego-accent': '#e8336c',
                        'mewego-primary': '#14b8a6', // Бирюзовый из референсов
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FBF5E5;
            color: #171E22;
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .gradient-bg {
            background: linear-gradient(180deg, #e8336c 0%, #14b8a6 100%);
            opacity: 0.15;
            position: absolute;
            inset: 0;
            z-index: -1;
        }
        .brand-gradient {
            background: linear-gradient(135deg, #e8336c 0%, #14b8a6 100%);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
